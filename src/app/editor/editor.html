<div class="toolbar">
  <div class="toolbar-section">
    <span class="selected-employee-info" *ngIf="selectedCandidate">
      Selected Employee: <strong>{{ selectedCandidate.candidateName }}</strong> - {{ selectedCandidate.position }}
    </span>
  </div>

  <div class="toolbar-section">
    <!-- <button (click)="openTemplateSelector()" class="btn btn-info">Choose Template</button> -->
    <button (click)="preview()" class="btn btn-info">Preview</button>
    <button (click)="saveOfferLetter()" class="btn btn-success" [disabled]="!selectedCandidate">Save Offer Letter</button>
    <button (click)="saveTemplate()" class="btn btn-warning" [disabled]="!selectedCandidate">Save As New Template</button>
  </div>
</div>

<!-- Template Selector Modal -->
<app-template-selector-modal
  [isVisible]="showTemplateModal"
  [templates]="predefinedTemplates"
  [selectedTemplate]="selectedTemplatePreview"
  (templateSelected)="onTemplateSelected($event)"
  (templateApplied)="onTemplateApplied($event)"
  (modalClosed)="closeTemplateSelector()"
></app-template-selector-modal>

<div class="editor-layout">
  <div class="editor-panel">
    <div class="panel-header">
      <h3>Offer Letter Editor</h3>
      <small>Drag blocks from the left panel to build your template</small>
    </div>
    <div id="gjs" class="editor-canvas"></div>
  </div>

  <div class="preview-panel" *ngIf="previewHtml">
    <div class="panel-header">
      <h3>Preview</h3>
      <button (click)="previewHtml = ''" class="btn btn-sm btn-outline-secondary">Close</button>
    </div>
    <div class="preview-content">
      <iframe [srcdoc]="previewHtml" width="100%" height="100%"></iframe>
    </div>
  </div>
</div>
